# GoReleaser v2 configuration for kuberoutectl. It drives two workflows:
#
#   - snapshot-release.yml (development branch) runs `goreleaser release
#     --snapshot`, which builds and archives WITHOUT publishing; that workflow
#     then uploads the artifacts to a mutable pre-release via the gh CLI. The
#     `release:` block below is inert in snapshot mode.
#   - release.yml (on a `vX.Y.Z` tag) runs `goreleaser release`, which builds
#     AND publishes using the `release:` block — a draft GitHub release a
#     maintainer reviews and publishes.
#
# Every OS/arch pair is shipped: Windows, Linux, and macOS, each in amd64 and
# arm64. The build is pure Go (CGO disabled), so arm64 cross-compilation needs
# no extra toolchain.
version: 2

project_name: kuberoutectl

before:
  hooks:
    - go mod tidy

builds:
  - id: kuberoutectl
    main: ./cmd/kuberoutectl
    binary: kuberoutectl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/ymedlop/kuberoutectl/internal/buildinfo.Version={{ .Version }}
      - -X github.com/ymedlop/kuberoutectl/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/ymedlop/kuberoutectl/internal/buildinfo.Date={{ .Date }}
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# The rolling snapshot tag (development-snapshot) is intentionally NOT semver, so
# the version template must not try to parse it as one. `incpatch .Version`
# requires a semver input and fails once that tag exists, so use a fixed
# semver-valid prefix plus the commit instead.
snapshot:
  version_template: "0.0.0-snapshot-{{ .ShortCommit }}"

changelog:
  disable: true

# Used only on a real tag (release.yml). Snapshots publish via the gh CLI and
# never reach this step. Releases land as a draft for a maintainer to review and
# publish; prerelease is auto-detected from the tag's semver pre-release segment
# (v1.0.0 -> full, v1.0.0-rc.1 -> pre-release).
release:
  draft: true
  prerelease: auto

# Homebrew distribution. GoReleaser generates a cask and pushes it to a separate
# tap repo (ymedlop/homebrew-tap) on stable releases, so macOS users can
# `brew install ymedlop/tap/kuberoutectl`. Casks, not the deprecated `brews:`
# formula block (which fails `goreleaser check` since v2.16).
#
# Only fires on a real `goreleaser release`; `skip_upload: auto` also skips
# pre-releases so the tap only ever points at a stable version. Requires the
# HOMEBREW_TAP_GITHUB_TOKEN secret (a PAT with write access to the tap repo) —
# the default GITHUB_TOKEN cannot push to a different repository. See RELEASING.md.
homebrew_casks:
  - name: kuberoutectl
    # No `binary:` — deprecated in v2.16+ (fails `goreleaser check`); GoReleaser
    # infers the binary name from the build, emitting `binary "kuberoutectl"`.
    #
    # GoReleaser also emits on_linux stanzas here (its cask artifact filter always
    # includes both darwin and linux archives). They are inert: Homebrew installs
    # casks on macOS only. We deliberately do NOT split the single build/archive
    # into per-OS ids to strip them — that would duplicate the ldflags/version
    # block for cosmetic dead code. This distribution is macOS-only in practice.
    repository:
      owner: ymedlop
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/ymedlop/kuberoutectl"
    description: "Provider-agnostic Kubernetes access routing CLI"
    # Currently a no-op for casks (GoReleaser v2.17 ignores it); kept so it takes
    # effect if/when cask license support lands.
    license: "Apache-2.0"
    skip_upload: auto
    # The binary is unsigned, so macOS quarantines it on install. Clear the
    # quarantine attribute post-install so `brew install` yields a runnable
    # binary with no manual `xattr` step.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kuberoutectl"]
          end

# Linux packages (issue #48). GoReleaser builds .deb/.rpm/.apk in pure Go (no
# system tooling) and attaches them to the GitHub release — no external repo or
# secret. Unlike casks/scoops there is no `skip_upload`, so the packages ship on
# every release including pre-releases. The binary is auto-placed at /usr/bin.
nfpms:
  - id: packages
    package_name: kuberoutectl
    maintainer: "Yeray Medina Lopez <ymedlop@gmail.com>"
    homepage: "https://github.com/ymedlop/kuberoutectl"
    description: "Provider-agnostic Kubernetes access routing CLI"
    license: Apache-2.0
    formats: [deb, rpm, apk]

# Windows distribution via Scoop (issue #47). GoReleaser writes a manifest and
# pushes it to a separate bucket repo (ymedlop/scoop-bucket) on stable releases,
# mirroring the Homebrew tap. `skip_upload: auto` skips pre-releases/snapshots so
# the bucket only points at a stable version. Requires the SCOOP_BUCKET_GITHUB_TOKEN
# secret (a PAT with write access to the bucket) — see RELEASING.md.
scoops:
  - name: kuberoutectl
    repository:
      owner: ymedlop
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/ymedlop/kuberoutectl"
    description: "Provider-agnostic Kubernetes access routing CLI"
    license: Apache-2.0
    skip_upload: auto

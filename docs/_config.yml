# Jekyll configuration for the kuberoutectl documentation site.
#
# Built with the Just-the-Docs theme and deployed to GitHub Pages by
# .github/workflows/pages.yml (Jekyll 4 + Bundler, not the legacy Pages
# builder). Local preview:
#
#   cd docs && bundle install && bundle exec jekyll serve
#
# The site lives at https://<user>.github.io/kuberoutectl/, so baseurl must
# match the repository name for assets and relative links to resolve.

title: kuberoutectl
description: >-
  Discover, organize, and route Kubernetes access across Azure, AWS, GCP,
  and kubeconfig — from one provider-agnostic CLI.
url: "https://ymedlop.github.io"
baseurl: "/kuberoutectl"

theme: just-the-docs

# --- Theme behavior -----------------------------------------------------------

# Custom brand color scheme (see _sass/color_schemes/kuberoute.scss).
color_scheme: kuberoute

# Full-text search over all pages.
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Copy button on every fenced code block.
enable_copy_code_button: true

# Header links shown top-right on every page.
aux_links:
  "GitHub":
    - "https://github.com/ymedlop/kuberoutectl"
aux_links_new_tab: true

# Footer + "edit this page on GitHub" links.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ymedlop/kuberoutectl"
gh_edit_branch: "development"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Sidebar footer.
footer_content: >-
  kuberoutectl is open source under the Apache License 2.0.

# Back-to-top and last-modified niceties.
back_to_top: true
back_to_top_text: "Back to top"

# Links to canonical repo docs that live outside the site source.
nav_external_links:
  - title: "Architecture"
    url: "https://github.com/ymedlop/kuberoutectl/blob/main/ARCHITECTURE.md"
  - title: "Source on GitHub"
    url: "https://github.com/ymedlop/kuberoutectl"

# Callout boxes used across the guides ({: .note }, {: .warning } ...).
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# --- Build --------------------------------------------------------------------

plugins:
  - jekyll-relative-links   # keep in-repo .md links working on the site too
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-relative-links: rewrite ./foo.md links to their rendered URLs.
relative_links:
  enabled: true
  collections: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - agent-rules-archive/   # internal template archive, not user docs

# Nicer URLs: /guides/azure/ instead of /guides/azure.html
permalink: pretty

# .spartan/config.yaml — Generated by /spartan:init-rules (go-standard profile)
# Validate: /spartan:lint-rules
# Auto-detect rules from code: /spartan:scan-rules

# ─── Stack & Architecture ───────────────────────────────────────────

stack: go-standard
architecture: ports-and-adapters
# Dependency arrows point inward:
#   domain      <- imports nothing in-repo
#   services    <- domain, cache, providers (interfaces)
#   cli         <- services only; Cobra RunE = parse flags / call service / render
#   providers/* <- behind Registry + Capabilities; no provider conditionals in core
#   execx       <- external CLIs (az/aws/gcloud/kubectl) isolated here

# ─── Rules ──────────────────────────────────────────────────────────

rules:
  shared:
    - AGENTS.md    # domain model + architecture rules (Scope != Target, etc.)
    - CLAUDE.md    # behavioral contract + verification ladder
    # Deep per-domain knowledge lives in .claude/skills/*/ (load on demand):
    # cloud-adapters, kubernetes-inventory, go-development — each has Gotchas.

  backend: []

  frontend: []     # no frontend in this repo

# ─── File Type Mapping ──────────────────────────────────────────────

file-types:
  backend: [".go"]
  frontend: []
  migration: []    # JSON persistence only — no SQL by design (see AGENTS.md)
  config: [".yaml", ".yml", ".json", ".toml", ".mod"]

# ─── Review Stages ──────────────────────────────────────────────────
# database-api dropped: no SQL, no HTTP API; input validation is covered by
# correctness + stack-conventions.

review-stages:
  - correctness
  - stack-conventions
  - test-coverage
  - architecture
  - security
  - documentation-gaps

# ─── Build Commands ─────────────────────────────────────────────────
# golangci-lint is deliberately not assumed (not installed); lint mirrors
# what CI runs. Full pre-PR gate: `make check && bash scripts/e2e.sh`.

commands:
  test:
    backend: "go test ./..."
  build:
    backend: "go build ./..."
  lint:
    backend: "make fmt-check && go vet ./..."
  e2e:
    backend: "bash scripts/e2e.sh"

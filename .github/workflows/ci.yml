# PR gate: format, vet, unit tests, and the fake-CLI e2e flow.
#
# Without this, only CodeQL ran on pull requests — go test never gated a PR
# and a broken change would merge cleanly, failing only in the post-merge
# snapshot build. This closes that gap.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check (fmt + vet + test)
        run: make check

      - name: E2E smoke test (fake provider CLIs)
        run: bash scripts/e2e.sh

      - name: Verify README + demo commands still exist
        run: bash scripts/verify-readme-commands.sh

      - name: Command reference is up to date
        run: |
          go run ./cmd/gen-docs docs/reference
          git diff --exit-code docs/reference \
            || { echo "::error::docs/reference is stale — run 'make docs-reference' and commit."; exit 1; }

  # Validate the GoReleaser packaging config so a broken release setup fails the
  # PR instead of the tag push. `goreleaser check` only lints the YAML — it does
  # not build, publish, or need a Go toolchain.
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check .goreleaser.yaml
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

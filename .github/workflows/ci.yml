# PR gate: format, vet, unit tests, and the fake-CLI e2e flow.
#
# Without this, only CodeQL ran on pull requests — go test never gated a PR
# and a broken change would merge cleanly, failing only in the post-merge
# snapshot build. This closes that gap.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check (fmt + vet + test)
        run: make check

      - name: E2E smoke test (fake provider CLIs)
        run: bash scripts/e2e.sh
